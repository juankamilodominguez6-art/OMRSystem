<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Ventas POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/auth.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .product-card:hover { transform: scale(1.03); }
        .numpad-btn:hover { background: linear-gradient(135deg, #e5e7eb, #d1d5db); }
        .numpad-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-xl sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center">
                        <span class="text-2xl">🏪</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">OMR System - Panel de Ventas</h1>
                        <p class="text-blue-200 text-sm">Sistema POS Profesional</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-sm text-blue-200">Usuario</p>
                        <p class="font-bold" id="userName">Juan Pérez</p>
                    </div>
                    <button onclick="AuthService.logout()" class="px-4 py-2 bg-red-500/80 hover:bg-red-500 rounded-xl font-semibold transition-all">
                        Cerrar Sesión
                    </button>
                    <a href="index.html" class="px-4 py-2 bg-white/20 hover:bg-white/30 rounded-xl font-semibold transition-all">
                        ← Volver
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left Panel - Products -->
            <div class="lg:col-span-8">
                <!-- Categories -->
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-4 mb-6">
                    <div class="flex flex-wrap gap-3" id="categories">
                        <button onclick="selectCategory('all')" class="category-btn px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-semibold rounded-xl shadow-sm transition-all">
                            📋 Todos
                        </button>
                        <button onclick="selectCategory('fruits')" class="category-btn px-6 py-3 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 font-semibold rounded-xl transition-all">
                            🍎 Frutas y Verduras
                        </button>
                        <button onclick="selectCategory('grains')" class="category-btn px-6 py-3 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 font-semibold rounded-xl transition-all">
                            🌾 Granos
                        </button>
                        <button onclick="selectCategory('liquids')" class="category-btn px-6 py-3 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 font-semibold rounded-xl transition-all">
                            🥤 Bebidas y Licores
                        </button>
                        <button onclick="selectCategory('snacks')" class="category-btn px-6 py-3 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 font-semibold rounded-xl transition-all">
                            🍿 Abarrotes
                        </button>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-6">
                    <h2 class="text-xl font-bold text-slate-900 mb-4 flex items-center gap-2">
                        📦 Productos
                        <span class="text-slate-400 text-sm font-normal">Selecciona para agregar al carrito</span>
                    </h2>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" id="productsGrid">
                        <!-- Products will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Right Panel - Cart & Checkout -->
            <div class="lg:col-span-4">
                <!-- Cart -->
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden mb-6">
                    <div class="bg-gradient-to-r from-slate-50 to-slate-100 border-b border-slate-200 p-4">
                        <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                            🛒 Carrito
                            <span id="cartCount" class="bg-blue-500 text-white text-xs font-bold px-2 py-1 rounded-full">0</span>
                        </h2>
                    </div>
                    <div class="p-4 max-h-80 overflow-y-auto" id="cartItems">
                        <p class="text-slate-400 text-center py-8">No hay productos en el carrito</p>
                    </div>
                    <div class="border-t border-slate-200 p-4 bg-slate-50">
                        <div class="space-y-2 mb-4">
                            <div class="flex justify-between text-sm">
                                <span class="text-slate-600">Subtotal</span>
                                <span id="subtotal" class="font-semibold">$0.00</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-slate-600">Impuesto (18%)</span>
                                <span id="tax" class="font-semibold">$0.00</span>
                            </div>
                            <div class="flex justify-between text-xl font-black text-slate-900 border-t border-slate-200 pt-2">
                                <span>Total</span>
                                <span id="total">$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Num Pad -->
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-4 mb-6">
                    <h3 class="text-sm font-bold text-slate-700 mb-3">🔢 Cantidad</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="numpadInput(7)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">7</button>
                        <button onclick="numpadInput(8)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">8</button>
                        <button onclick="numpadInput(9)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">9</button>
                        <button onclick="numpadInput(4)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">4</button>
                        <button onclick="numpadInput(5)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">5</button>
                        <button onclick="numpadInput(6)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">6</button>
                        <button onclick="numpadInput(1)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">1</button>
                        <button onclick="numpadInput(2)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">2</button>
                        <button onclick="numpadInput(3)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700">3</button>
                        <button onclick="numpadInput(0)" class="numpad-btn bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl py-4 text-xl font-bold text-slate-700 col-span-2">0</button>
                        <button onclick="numpadClear()" class="bg-gradient-to-br from-red-100 to-rose-100 border border-red-200 text-red-700 rounded-xl py-4 text-xl font-bold">⌫</button>
                    </div>
                </div>

                <!-- Payment Methods & Actions -->
                <div class="space-y-4">
                    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-4">
                        <h3 class="text-sm font-bold text-slate-700 mb-3">💳 Método de Pago</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setPaymentMethod('cash')" id="payCash" class="bg-gradient-to-r from-emerald-500 to-green-500 text-white font-semibold py-3 rounded-xl shadow-sm">
                                💵 Efectivo
                            </button>
                            <button onclick="setPaymentMethod('card')" id="payCard" class="bg-white border border-slate-200 text-slate-700 font-semibold py-3 rounded-xl">
                                💳 Tarjeta
                            </button>
                            <button onclick="setPaymentMethod('credit')" id="payCredit" class="bg-white border border-slate-200 text-slate-700 font-semibold py-3 rounded-xl">
                                ⏳ Crédito
                            </button>
                            <button onclick="setPaymentMethod('transfer')" id="payTransfer" class="bg-white border border-slate-200 text-slate-700 font-semibold py-3 rounded-xl">
                                🔄 Transferencia
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-4">
                        <label class="text-sm font-bold text-slate-700 mb-2 block">💰 Pago Recibido</label>
                        <input type="number" id="paidAmount" value="0" step="0.01" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-xl font-bold text-center focus:border-blue-500">
                        <p class="text-sm text-slate-600 mt-2">
                            Cambio: <span id="changeAmount" class="font-bold text-emerald-700">$0.00</span>
                        </p>
                    </div>

                    <div class="flex gap-3">
                        <button onclick="clearCart()" class="flex-1 px-6 py-4 bg-gradient-to-r from-slate-200 to-slate-300 text-slate-800 font-bold rounded-xl hover:from-slate-300 hover:to-slate-400 transition-all">
                            🗑️ Vaciar
                        </button>
                        <button onclick="checkout()" id="checkoutBtn" disabled class="flex-2 px-6 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black text-lg rounded-xl shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                            ✅ Pagar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Sample Products Data - Pesos Colombianos
        const products = [
            { id: 1, category: 'fruits', name: 'Manzanas Rojas (lb)', price: 4500, stock: 100, image: '🍎' },
            { id: 2, category: 'fruits', name: 'Plátanos (Unidad)', price: 800, stock: 80, image: '🍌' },
            { id: 3, category: 'fruits', name: 'Naranjas (lb)', price: 3200, stock: 60, image: '🍊' },
            { id: 4, category: 'grains', name: 'Arroz Blanco (lb)', price: 2800, stock: 50, image: '🍚' },
            { id: 5, category: 'grains', name: 'Frijoles Negros (lb)', price: 3500, stock: 45, image: '🫘' },
            { id: 6, category: 'liquids', name: 'Coca Cola 2L', price: 6500, stock: 70, image: '🥤' },
            { id: 7, category: 'liquids', name: 'Agua Mineral 600ml', price: 1800, stock: 150, image: '💧' },
            { id: 8, category: 'snacks', name: 'Papas Fritas', price: 3500, stock: 90, image: '🍟' },
            { id: 9, category: 'snacks', name: 'Chocolate', price: 4800, stock: 40, image: '🍫' },
            { id: 10, category: 'snacks', name: 'Galletas', price: 2500, stock: 75, image: '🍪' },
            { id: 11, category: 'fruits', name: 'Uvas Verdes (lb)', price: 6500, stock: 35, image: '🍇' },
            { id: 12, category: 'liquids', name: 'Cerveza', price: 5200, stock: 100, image: '🍺' },
        ];

        let cart = [];
        let selectedCategory = 'all';
        let selectedProduct = null;
        let numpadValue = '';
        let paymentMethod = 'cash';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updatePaidAmount();
        });

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = selectedCategory === 'all' ? products : products.filter(p => p.category === selectedCategory);
            
            grid.innerHTML = filtered.map(p => `
                <div onclick="addToCart(${p.id})" class="product-card bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200 rounded-xl p-4 cursor-pointer transition-all duration-200 shadow-sm hover:shadow-md">
                    <div class="text-5xl text-center mb-2">${p.image}</div>
                    <h3 class="font-bold text-slate-900 text-center">${p.name}</h3>
                    <p class="text-2xl font-black text-blue-600 text-center mt-2">$${p.price.toFixed(2)}</p>
                    <p class="text-xs text-slate-500 text-center mt-1">Stock: ${p.stock}</p>
                </div>
            `).join('');
        }

        function selectCategory(cat) {
            selectedCategory = cat;
            renderProducts();
            
            // Update button styles
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('bg-gradient-to-r', 'from-blue-500', 'to-indigo-500', 'text-white', 'border-blue-500');
                btn.classList.add('bg-white', 'border', 'border-slate-200', 'text-slate-700');
            });
            event.target.classList.remove('bg-white', 'border', 'border-slate-200', 'text-slate-700');
            event.target.classList.add('bg-gradient-to-r', 'from-blue-500', 'to-indigo-500', 'text-white', 'border-blue-500');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const quantity = parseInt(numpadValue) || 1;
            
            const existing = cart.find(item => item.product_id === productId);
            if (existing) {
                existing.quantity += quantity;
            } else {
                cart.push({
                    product_id: productId,
                    product_name: product.name,
                    price: product.price,
                    quantity: quantity,
                    image: product.image
                });
            }
            
            numpadValue = '';
            renderCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.product_id !== productId);
            renderCart();
        }

        function updateQuantity(productId, delta) {
            const item = cart.find(i => i.product_id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    renderCart();
                }
            }
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            document.getElementById('cartCount').textContent = cart.length;
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center py-8">No hay productos en el carrito</p>';
                document.getElementById('checkoutBtn').disabled = true;
                return;
            }
            
            container.innerHTML = cart.map(item => `
                <div class="flex items-center justify-between py-3 border-b border-slate-100">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${item.image}</span>
                        <div>
                            <p class="font-semibold text-slate-900">${item.product_name}</p>
                            <p class="text-sm text-blue-600 font-bold">$${item.price.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateQuantity(${item.product_id}, -1)" class="w-8 h-8 bg-slate-100 text-slate-700 rounded-lg font-bold">-</button>
                        <span class="w-10 text-center font-bold">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.product_id}, 1)" class="w-8 h-8 bg-blue-100 text-blue-700 rounded-lg font-bold">+</button>
                        <button onclick="removeFromCart(${item.product_id})" class="w-8 h-8 bg-red-100 text-red-600 rounded-lg font-bold">×</button>
                    </div>
                </div>
            `).join('');
            
            updateTotals();
            document.getElementById('checkoutBtn').disabled = false;
        }

        function updateTotals() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.18;
            const total = subtotal + tax;
            
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
            
            updateChange();
        }

        function numpadInput(num) {
            numpadValue += num;
        }

        function numpadClear() {
            numpadValue = numpadValue.slice(0, -1);
        }

        function updatePaidAmount() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) * 1.18;
            document.getElementById('paidAmount').value = total.toFixed(2);
            updateChange();
        }

        document.getElementById('paidAmount').addEventListener('input', updateChange);

        function updateChange() {
            const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) * 1.18;
            const change = Math.max(0, paid - total);
            document.getElementById('changeAmount').textContent = `$${change.toFixed(2)}`;
        }

        function setPaymentMethod(method) {
            paymentMethod = method;
            document.querySelectorAll('#payCash, #payCard, #payCredit, #payTransfer').forEach(btn => {
                btn.classList.remove('bg-gradient-to-r', 'from-emerald-500', 'to-green-500', 'text-white', 'border');
                btn.classList.add('bg-white', 'border', 'border-slate-200', 'text-slate-700');
            });
            const btnId = { cash: 'payCash', card: 'payCard', credit: 'payCredit', transfer: 'payTransfer' }[method];
            document.getElementById(btnId).classList.remove('bg-white', 'border', 'border-slate-200', 'text-slate-700');
            document.getElementById(btnId).classList.add('bg-gradient-to-r', 'from-emerald-500', 'to-green-500', 'text-white');
        }

        function clearCart() {
            cart = [];
            renderCart();
        }

        async function checkout() {
            if (cart.length === 0) return;
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) * 1.18;
            const paidAmount = parseFloat(document.getElementById('paidAmount').value) || total;
            
            // Preparar datos de la venta
            const saleData = {
                items: cart.map(item => ({
                    productId: item.product_id,
                    productName: item.product_name,
                    sku: `SKU-${item.product_id}`,
                    category: 'General',
                    quantity: item.quantity,
                    unitPrice: item.price
                })),
                paymentMethod: paymentMethod,
                paidAmount: paidAmount,
                notes: 'Venta POS',
                taxRate: 0.18
            };

            try {
                console.log('Sending sale data to:', `${AuthService.API_URL}/sales`);
                // Enviar venta al backend
                const response = await fetch(`${AuthService.API_URL}/sales`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${AuthService.getToken() || ''}`
                    },
                    body: JSON.stringify(saleData)
                });

                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Result:', result);

                if (result.success) {
                    // Mostrar PDF inmediatamente
                    if (result.pdf) {
                        console.log('PDF received, showing invoice...');
                        showInvoicePDF(result.pdf, result.sale.saleNumber);
                    } else {
                        console.log('No PDF in result');
                        alert(`✅ Venta completada!\nVenta #: ${result.sale.saleNumber}\nTotal: $${total.toFixed(2)}\nMétodo: ${paymentMethod.toUpperCase()}\n\n¡Gracias por su compra!`);
                    }
                    
                    cart = [];
                    renderCart();
                } else {
                    alert('❌ Error al procesar la venta: ' + result.message);
                }
            } catch (error) {
                console.error('Error in checkout:', error);
                alert('❌ Error al conectar con el servidor. Verifica que el backend esté corriendo.');
            }
        }

        function showInvoicePDF(pdfBase64, saleNumber) {
            console.log('showInvoicePDF called with sale #:', saleNumber);
            console.log('pdfBase64 length:', pdfBase64.length);
            
            // Crear una ventana nueva para mostrar el PDF
            const pdfWindow = window.open('', '_blank');
            if (!pdfWindow) {
                alert('❌ Por favor, permite las ventanas emergentes para ver la factura');
                return;
            }
            
            // Convertir base64 a blob
            const byteCharacters = atob(pdfBase64);
            const byteArray = new Uint8Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteArray[i] = byteCharacters.charCodeAt(i);
            }
            const blob = new Blob([byteArray], { type: 'application/pdf' });
            const pdfUrl = URL.createObjectURL(blob);
            console.log('Created PDF URL:', pdfUrl);
            
            // Cargar el PDF en la nueva ventana
            pdfWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Factura #${saleNumber}</title>
                    <style>
                        body { margin: 0; padding: 0; }
                        iframe { width: 100%; height: 100vh; border: none; }
                    </style>
                </head>
                <body>
                    <iframe src="${pdfUrl}"></iframe>
                </body>
                </html>
            `);
            pdfWindow.document.close();
            
            // Esperar a que cargue y luego imprimir
            pdfWindow.onload = function() {
                console.log('PDF window loaded');
                setTimeout(() => {
                    console.log('Triggering print...');
                    pdfWindow.focus();
                    pdfWindow.print();
                }, 1500);
            };
      }

        // Verificar autenticación al cargar
        window.addEventListener('load', () => {
            AuthService.requireAuth();
            
            const user = AuthService.getUser();
            if (user) {
                // Si es el dueño, redirigir al dashboard
                if (user.email === 'dueno@omr.com') {
                    window.location.href = 'index.html';
                    return;
                }
                
                document.getElementById('userName').textContent = user.name;
            }
        });
    </script>
</body>
</html>
