<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes y Estadísticas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/auth.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link:hover { background: linear-gradient(90deg, #eff6ff, #dbeafe); }
        .sidebar-link.active { background: linear-gradient(90deg, #dbeafe, #bfdbfe); border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-slate-200 shadow-xl">
            <div class="p-6 border-b border-slate-200">
                <div class="flex items-center gap-4">
                    <img src="./assets/logo.jpg" alt="EMR System Logo" class="w-12 h-12 rounded-xl object-cover">
                    <div>
                        <h1 class="text-xl font-black text-slate-900">EMR System</h1>
                        <p class="text-sm text-slate-500">Panel de Admin</p>
                    </div>
                </div>
            </div>
            
            <nav class="p-4 space-y-2">
                <a href="index.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-700 font-semibold">
                    <span>📊</span>
                    Inicio
                </a>
                <a href="pos-panel.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-700 font-semibold">
                    <span>💵</span>
                    Ventas (POS)
                </a>
                <a href="admin-dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-700 font-semibold">
                    <span>📦</span>
                    Productos
                </a>
                <a href="#" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl text-blue-700 font-semibold">
                    <span>📈</span>
                    Reportes
                </a>
                <a href="cash-register.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-700 font-semibold">
                    <span>💰</span>
                    Caja
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1">
            <!-- Header -->
            <header class="bg-white border-b border-slate-200 shadow-sm px-6 py-4 sticky top-0 z-20">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-black text-slate-900">Reportes y Estadísticas</h2>
                        <p class="text-slate-500 text-sm">Historial de ventas y análisis</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-3 px-4 py-2 bg-slate-100 rounded-xl">
                            <div class="w-10 h-10 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-full flex items-center justify-center">
                                <span class="font-bold text-blue-700" id="userInitials">US</span>
                            </div>
                            <span class="font-semibold text-slate-700" id="userName">Usuario</span>
                        </div>
                        <button onclick="loadSales()" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-xl font-semibold hover:bg-blue-200 transition-all">
                            🔄 Actualizar
                        </button>
                    </div>
                </div>
            </header>

            <div class="p-6 space-y-6 max-w-7xl mx-auto">
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-semibold text-slate-600">Ventas Totales</p>
                                <p class="text-3xl font-black text-slate-900 mt-2" id="totalSales">$0</p>
                            </div>
                            <div class="w-14 h-14 bg-gradient-to-br from-emerald-100 to-green-100 rounded-2xl flex items-center justify-center text-3xl">💵</div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-semibold text-slate-600">Transacciones</p>
                                <p class="text-3xl font-black text-slate-900 mt-2" id="transactionCount">0</p>
                            </div>
                            <div class="w-14 h-14 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-2xl flex items-center justify-center text-3xl">📊</div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-semibold text-slate-600">Total Impuestos</p>
                                <p class="text-3xl font-black text-slate-900 mt-2" id="totalTax">$0</p>
                            </div>
                            <div class="w-14 h-14 bg-gradient-to-br from-purple-100 to-pink-100 rounded-2xl flex items-center justify-center text-3xl">📈</div>
                        </div>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-200">
                        <div class="flex items-center justify-between">
                            <h3 class="text-xl font-black text-slate-900">Historial de Ventas</h3>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gradient-to-r from-slate-50 to-slate-100 border-b border-slate-200">
                                <tr>
                                    <th class="px-6 py-4 text-left text-sm font-bold text-slate-700">Número Venta</th>
                                    <th class="px-6 py-4 text-left text-sm font-bold text-slate-700">Fecha</th>
                                    <th class="px-6 py-4 text-center text-sm font-bold text-slate-700">Método</th>
                                    <th class="px-6 py-4 text-right text-sm font-bold text-slate-700">Total</th>
                                    <th class="px-6 py-4 text-right text-sm font-bold text-slate-700">Pago</th>
                                    <th class="px-6 py-4 text-right text-sm font-bold text-slate-700">Cambio</th>
                                    <th class="px-6 py-4 text-center text-sm font-bold text-slate-700 rounded-tr-2xl">Acciones</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100" id="salesTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadSales() {
            try {
                const response = await fetch(`${AuthService.API_URL}/sales`, {
                    headers: {
                        'Authorization': `Bearer ${AuthService.getToken()}`
                    }
                });

                const result = await response.json();
                if (result.success) {
                    renderSales(result.sales);
                }
            } catch (error) {
                console.error('Error loading sales:', error);
            }
        }

        function renderSales(sales) {
            const totalSales = sales.reduce((sum, s) => sum + parseFloat(s.total), 0);
            const totalTax = sales.reduce((sum, s) => sum + parseFloat(s.tax), 0);
            document.getElementById('totalSales').textContent = `$${totalSales.toFixed(2)}`;
            document.getElementById('transactionCount').textContent = sales.length;
            document.getElementById('totalTax').textContent = `$${totalTax.toFixed(2)}`;

            const body = document.getElementById('salesTableBody');
            if (sales.length === 0) {
                body.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-slate-400">No hay ventas registradas</td></tr>';
                return;
            }

            body.innerHTML = sales.map(sale => {
                const date = new Date(sale.saleDate);
                const dateStr = date.toLocaleString('es-ES', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                const paymentMethodLabels = {
                    cash: '💵 Efectivo',
                    card: '💳 Tarjeta',
                    credit: '⏳ Crédito',
                    transfer: '🔄 Transferencia'
                };
                
                return `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-bold text-slate-900">#${sale.saleNumber}</td>
                        <td class="px-6 py-4 text-slate-700">${dateStr}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-semibold">${paymentMethodLabels[sale.paymentMethod] || sale.paymentMethod}</span>
                        </td>
                        <td class="px-6 py-4 text-right font-bold text-slate-900">$${parseFloat(sale.total).toFixed(2)}</td>
                        <td class="px-6 py-4 text-right font-semibold text-slate-700">$${parseFloat(sale.paidAmount).toFixed(2)}</td>
                        <td class="px-6 py-4 text-right font-bold text-emerald-700">$${parseFloat(sale.changeAmount).toFixed(2)}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="downloadInvoice(${sale.id})" class="px-3 py-1 bg-slate-100 text-slate-700 rounded-lg text-sm font-semibold hover:bg-slate-200 transition-all">
                                📄 Ver Factura
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function downloadInvoice(saleId) {
            try {
                const response = await fetch(`${AuthService.API_URL}/sales/${saleId}/pdf`, {
                    headers: {
                        'Authorization': `Bearer ${AuthService.getToken()}`
                    }
                });

                const result = await response.json();
                if (result.success) {
                    showInvoicePDF(result.pdf, result.saleNumber);
                }
            } catch (error) {
                console.error('Error downloading invoice:', error);
                alert('❌ Error al descargar la factura');
            }
        }

        function showInvoicePDF(pdfBase64, saleNumber) {
            const pdfWindow = window.open('', '_blank');
            const pdfData = atob(pdfBase64);
            const byteArray = new Uint8Array(pdfData.length);
            
            for (let i = 0; i < pdfData.length; i++) {
                byteArray[i] = pdfData.charCodeAt(i);
            }
            
            const blob = new Blob([byteArray], { type: 'application/pdf' });
            const pdfUrl = URL.createObjectURL(blob);
            
            pdfWindow.document.write(`
                <html>
                <head><title>Factura #${saleNumber}</title></head>
                <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
                    <iframe src="${pdfUrl}" width="100%" height="100%" style="border:none;"></iframe>
                </body>
                </html>
            `);
        }

        window.addEventListener('load', () => {
            AuthService.requireAuth();
            
            const user = AuthService.getUser();
            if (user) {
                document.getElementById('userName').textContent = user.name;
                const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                document.getElementById('userInitials').textContent = initials;
            }
            
            loadSales();
        });
    </script>
</body>
</html>
