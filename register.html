<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - OMR System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/auth.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <!-- Logo y Título -->
        <div class="text-center mb-8">
            <img src="./assets/logo.jpg" alt="OMR System Logo" class="inline-block w-48 h-auto mb-4 rounded-2xl shadow-2xl">
            <h1 class="text-3xl font-extrabold text-white mb-2">OMR System</h1>
            <p class="text-white/80">Crea tu cuenta para comenzar</p>
        </div>

        <!-- Registration Type Selection (only one option) -->
        <div class="grid grid-cols-1 md:grid-cols-1 gap-6 mb-8">
            <div id="ownerOption" class="cursor-pointer bg-white rounded-3xl shadow-2xl p-6 border-4 border-indigo-500 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-2xl flex items-center justify-center text-3xl">🏪</div>
                    <div>
                        <h3 class="text-2xl font-black text-slate-900">Negocio</h3>
                        <p class="text-slate-500 text-sm">Crea tu empresa y empieza a usar el sistema inmediatamente</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulario de Registro -->
        <div id="registrationForm" class="bg-white rounded-3xl shadow-2xl p-8">
            <form id="userRegisterForm" class="space-y-5">
                <!-- Nombre -->
                <div>
                    <label for="name" class="block text-sm font-bold text-slate-700 mb-2">
                        Nombre Completo
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">👤</span>
                        <input 
                            type="text" 
                            id="name" 
                            name="name"
                            required
                            minlength="3"
                            class="w-full pl-12 pr-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-indigo-500 focus:outline-none transition-all"
                            placeholder="Juan Pérez"
                        >
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-bold text-slate-700 mb-2">
                        Correo Electrónico
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">📧</span>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            required
                            class="w-full pl-12 pr-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-indigo-500 focus:outline-none transition-all"
                            placeholder="tu@ejemplo.com"
                        >
                    </div>
                </div>

                <!-- Company Name -->
                <div id="companyNameField">
                    <label for="companyName" class="block text-sm font-bold text-slate-700 mb-2">
                        Nombre de la Empresa
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🏪</span>
                        <input 
                            type="text" 
                            id="companyName" 
                            name="companyName"
                            minlength="3"
                            class="w-full pl-12 pr-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-indigo-500 focus:outline-none transition-all"
                            placeholder="Mi Tienda"
                        >
                    </div>
                </div>

                <!-- Company NIT (optional) -->
                <div id="companyNitField">
                    <label for="companyNit" class="block text-sm font-bold text-slate-700 mb-2">
                        NIT de la Empresa (Opcional)
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">📋</span>
                        <input 
                            type="text" 
                            id="companyNit" 
                            name="companyNit"
                            class="w-full pl-12 pr-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-indigo-500 focus:outline-none transition-all"
                            placeholder="900123456-7"
                        >
                    </div>
                </div>

                <!-- Contraseña -->
                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-2">
                        Contraseña
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            required
                            minlength="6"
                            class="w-full pl-12 pr-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-indigo-500 focus:outline-none transition-all"
                            placeholder="Mínimo 6 caracteres"
                        >
                    </div>
                </div>

                <!-- Confirmar Contraseña -->
                <div>
                    <label for="confirmPassword" class="block text-sm font-bold text-slate-700 mb-2">
                        Confirmar Contraseña
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔐</span>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword"
                            required
                            class="w-full pl-12 pr-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-indigo-500 focus:outline-none transition-all"
                            placeholder="Repite tu contraseña"
                        >
                    </div>
                </div>

                <!-- Botón de Registro -->
                <button 
                    type="submit"
                    id="registerBtn"
                    class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-xl hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
                >
                    Crear Cuenta
                </button>

                <!-- Mensaje de error -->
                <div id="errorMessage" class="hidden p-4 bg-red-50 border border-red-200 rounded-xl">
                    <p class="text-sm text-red-700 font-semibold" id="errorText"></p>
                </div>

                <!-- Mensaje de éxito -->
                <div id="successMessage" class="hidden p-4 bg-emerald-50 border border-emerald-200 rounded-xl">
                    <p class="text-sm text-emerald-700 font-semibold" id="successText"></p>
                </div>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 border-t border-slate-200"></div>
                <span class="px-4 text-sm text-slate-400">o</span>
                <div class="flex-1 border-t border-slate-200"></div>
            </div>

            <!-- Link a Login -->
            <p class="text-center text-slate-600">
                ¿Ya tienes una cuenta? 
                <a href="login.html" class="text-indigo-600 hover:text-indigo-700 font-bold hover:underline">
                    Inicia sesión aquí
                </a>
            </p>
        </div>

        <!-- Footer -->
        <p class="text-center text-white/60 text-sm mt-8">
            © 2024 OMR System. Todos los derechos reservados.
        </p>
    </div>

    <script>
        document.getElementById('userRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const companyName = document.getElementById('companyName').value;
            const companyNit = document.getElementById('companyNit').value;
            const registerBtn = document.getElementById('registerBtn');
            
            // Validar contraseñas coinciden
            if (password !== confirmPassword) {
                const errorDiv = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');
                errorText.textContent = 'Las contraseñas no coinciden';
                errorDiv.classList.remove('hidden');
                return;
            }

            // Deshabilitar botón
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="inline-block animate-spin mr-2">⏳</span> Registrando...';
            registerBtn.classList.add('opacity-75', 'cursor-not-allowed');
            
            // Ocultar mensajes anteriores
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('successMessage').classList.add('hidden');

            try {
                const result = await AuthService.register(name, email, password, companyName, companyNit, {
                    role: 'dueño',
                    companyName,
                    companyNit
                });
                
                if (result.success) {
                    // Mostrar mensaje de éxito
                    const successDiv = document.getElementById('successMessage');
                    const successText = document.getElementById('successText');
                    successText.textContent = `¡Cuenta creada exitosamente! Bienvenido, ${result.user.name}. Redirigiendo...`;
                    successDiv.classList.remove('hidden');
                    
                    // Redirigir al dashboard
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    // Mostrar error
                    const errorDiv = document.getElementById('errorMessage');
                    const errorText = document.getElementById('errorText');
                    errorText.textContent = result.message || 'Error al crear cuenta';
                    errorDiv.classList.remove('hidden');
                    
                    // Restaurar botón
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = 'Crear Cuenta';
                    registerBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            } catch (error) {
                console.error('Error:', error);
                
                // Mostrar error de conexión
                const errorDiv = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');
                errorText.textContent = 'Error al conectar con el servidor. Verifica que el backend esté corriendo.';
                errorDiv.classList.remove('hidden');
                
                // Restaurar botón
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Crear Cuenta';
                registerBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });

        // Update AuthService.register to accept the extra params
        const originalRegister = AuthService.register;
        AuthService.register = async (name, email, password, companyName, companyNit, extra = {}) => {
            try {
                const response = await fetch(`${AuthService.API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name, 
                        email, 
                        password, 
                        ...extra
                    })
                });

                const data = await response.json();
                
                if (data.success && data.token) {
                    // Usar sessionStorage por defecto para registro
                    AuthService.setSession(data.token, data.user, true);
                }
                
                return data;
            } catch (error) {
                console.error('Error en registro:', error);
                return { success: false, message: 'Error al conectar con el servidor' };
            }
        };

        // Verificar si ya está logueado
        window.addEventListener('load', () => {
            if (AuthService.isAuthenticated()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
